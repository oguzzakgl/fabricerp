version: '3.8'

services:
  # 1. PostgreSQL Veritabanı (Yerel veritabanı kullanılacaksa aktif kalmalı)
  postgres:
    image: postgres:16-alpine
    container_name: fabricerp_postgres
    restart: always
    environment:
      POSTGRES_DB: fabricerp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Cache
  redis:
    image: redis:alpine
    container_name: fabricerp_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # 3. PaddleOCR FastAPI Servisi
  ocr-service:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: fabricerp_ocr
    restart: always
    ports:
      - '8000:8000'
    environment:
      - GEMINI_API_KEY=buraya_gemini_api_key_yazilacak
      - OCR_ENGINE=gemini

  # 4. Backend NestJS Uygulaması
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fabricerp_backend
    restart: always
    ports:
      - '3001:3001'
    environment:
      # Neon DB kullanılacaksa buraya Neon DB URL'si yazılmalı
      - DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/fabricerp?schema=public
      - JWT_SECRET=UretimOrtamiIcinGuvenliAnahtarBurayaYazilmali123
      - PORT=3001
      - NODE_ENV=production
      - OCR_SERVICE_URL=http://ocr-service:8000/ocr
    depends_on:
      - postgres
      - redis
      - ocr-service

  # 5. Frontend React Nginx Sunucusu
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fabricerp_frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
